<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,40..300&display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="public/main.css" />
        <title>E-commerce Product Page</title>
    </head>
    <body>
        <header class="header">
            <section class="container">
                <nav class="navbar">
                    <div class="hamburger-menu" id="menu-icon">
                        <img
                            src="images/icon-menu.svg"
                            alt="hamburger-menu-icon" />
                    </div>
                    <span class="logo"
                        ><img src="images/logo.svg" alt="icon-logo"
                    /></span>
                    <ul class="menu">
                        <li><a href="#" class="active">Collection</a></li>
                        <li><a href="#">Men</a></li>
                        <li><a href="#">Women</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                    <div class="icons">
                        <img
                            class="cart"
                            src="images/icon-cart.svg"
                            alt="icon-cart" />
                        <img
                            class="avatar"
                            src="images/image-avatar.png"
                            alt="icon-avatar-user" />
                    </div>
                </nav>
            </section>
        </header>
    </body>
</html>
