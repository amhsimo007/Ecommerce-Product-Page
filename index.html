<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,40..300&display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="public/main.css" />
        <title>E-commerce Product Page</title>
    </head>
    <body>
        <header class="header" id="header">
            <nav class="navbar">
                <div class="hamburger-menu" id="hamburger-menu">
                    <img
                        class="icon-hamburger active"
                        id="icon-hamburger"
                        src="images/icon-menu.svg"
                        alt="icon-hamburger" />
                </div>
                <span class="logo" id="logo"
                    ><img src="images/logo.svg" alt="icon-logo"
                /></span>
                <div class="parent" id="parent">
                    <ul class="menu" id="menu">
                        <img
                            class="icon-close"
                            id="icon-close"
                            src="images/icon-close.svg"
                            alt="icon-close" />
                        <li id="collection" class="list-menu">
                            <a href="#">Collection</a>
                        </li>
                        <li id="men" class="list-menu">
                            <a href="#">Men</a>
                        </li>
                        <li id="women" class="list-menu">
                            <a href="#">Women</a>
                        </li>
                        <li id="about" class="list-menu">
                            <a href="#">About</a>
                        </li>
                        <li id="contact" class="list-menu">
                            <a href="#">Contact</a>
                        </li>
                    </ul>
                </div>
                <div class="icons-navbar">
                    <img
                        class="cart"
                        src="images/icon-cart.svg"
                        alt="icon-cart" />
                    <img
                        class="avatar"
                        src="images/image-avatar.png"
                        alt="icon-avatar-user" />
                </div>
            </nav>
            <section class="container" id="container">
                <div class="show-all-product" id="show-all-product">
                    <h1 class="title">Our Products</h1>
                    <div class="show-data" id="show-data"></div>
                </div>
                <div class="show-collections" id="show-collections"></div>
                <div class="card" id="card-women"></div>
                <div class="card" id="card-men"></div>
                <div class="image-slider" id="image-slider"></div>
            </section>
        </header>
        <script src="src/javascript/script.js"></script>
        <script src="src/javascript/product-category.js"></script>
        <script src="src/javascript/responsive-navbar.js"></script>
        <script src="src/javascript/image-slider.js"></script>
    </body>
</html>
